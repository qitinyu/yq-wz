        const regionTitle = document.querySelector('.region-title');
        const regionIconLeft = document.querySelector('.region-icon-left');
        const regionIconRight = document.querySelector('.region-icon-right');
        const closeBtn = document.querySelector('.close-btn');
        const guoElement = document.querySelector('.guo');

        // 添加点击事件
        hidden3Elements.forEach((hidden3) => {
            hidden3.addEventListener('click', () => {
                const regionName = hidden3.getAttribute('data-region');
                const regionIcon = hidden3.getAttribute('data-icon');

                // 更新标题 (只取前缀，例如 "枫丹-正义" -> "枫丹")
                regionTitle.textContent = regionName.split('-')[0];
                
                if(regionIcon) {
                    regionIconLeft.src = regionIcon;
                    regionIconRight.src = regionIcon;
                }

                // 清空内容
                guoElement.innerHTML = '';

                // 获取数据
                const regionContent = regionData[regionName] || [];

                // 渲染内容
                if (regionContent.length === 0) {
                    guoElement.innerHTML = `
                        <div class="lvtu-jt">
                            <h2>开发中</h2>
                            <span>${regionName}地区的详细内容正在开发中，敬请期待！</span>
                            <img src="https://uploadstatic.mihoyo.com/contentweb/20200113/2020011311501378197.jpg" alt="开发中">
                        </div>`;
                } else {
                    regionContent.forEach(item => {
                        const locationItem = document.createElement('div');
                        locationItem.className = 'lvtu-jt';
                        
                        // 修复：判断是否有图片，防止显示破损图标
                        let imgHtml = '';
                        if (item.img) {
                            imgHtml = `<img src="${item.img}" alt="${item.title}">`;
                        }

                        locationItem.innerHTML = `
                            <h2>${item.title}</h2>
                            <span>${item.desc}</span>
                            ${imgHtml}
                        `;
                        guoElement.appendChild(locationItem);
                    });
                }

                // 显示二级界面
                lvtu2.classList.add('active');
            });
        });

        // 关闭按钮
        closeBtn.addEventListener('click', () => {
            lvtu2.classList.remove('active');
        });

        // 点击背景关闭
        lvtu2.addEventListener('click', (e) => {
            if (e.target === lvtu2) {
                lvtu2.classList.remove('active');
            }
        });
